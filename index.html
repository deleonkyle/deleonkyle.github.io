<!DOCTYPE html>
<html lang="en">
<head>

<style>
body {
  margin: 0;
  width: 100vw;
  height: 100vh;
  background-image: url("wp.png");

}

div {
    width: 100vw;
    height: 100vh;
}

img {
  max-width:100%;
    height:auto;
}

.image {
  display: block;
  margin-left: auto;
  margin-right: auto;
  width: 70%;
  flex-basis: 40%
}
.text {
  text-align: justify;
  font-size: 20px;
  padding-left: 20px;
  color: black;
  }

.column {
  float: left;
  width: 100%;
  padding: 5px;
}

/* Clearfix (clear floats) */
.row::after {
  content: "";
  clear: both;
  display: table;
}
   .button {
  display: inline-block;
  border-radius: 2px;
  background-color:rgb(0, 255, 234);
  border: none;
  color: #000000;
  text-align: center;
  font-size: 34px;
  padding: 20px;
  width: 250px;
  transition: all 0.5s;
  cursor: pointer;
  margin: 0px;
  width: 300px;
  height: 100px;
  bottom: 0;
  left: 0;
  right: 0;
}

.button span {
  cursor: pointer;
  display: inline-block;
  position: relative;
  transition: 0.5s;
}

.button span:after {
  content: '\00bb';
  position: absolute;
  opacity: 0;
  top: 0;
  right: -20px;
  transition: 0.5s;
}

.button:hover span {
  padding-right: 25px;
}

.button:hover span:after {
  opacity: 1;
  right: 0;
}
.container {
  position: relative;
  text-align: center;
  color: white;
  }
  .centered {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* Responsive layout - makes the three columns stack on top of each other instead of next to each other */
@media screen and (max-width: 500px) {
  .column {
    width: 100%;
  }
}

</style>
</head>
<body>

<div class="container">
<div class="centered"> <h1 style="font-family: Monaco ; color:rgb(0, 255, 234);">aDubu Net</h1>
</div>


  <center> <a class="button" href="home.html"; style="vertical-align:middle"><span>Enter</span></a>

</center>


</body>
</html>
